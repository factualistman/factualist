<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>Factualist Direct Access</title>
  <meta name="description" content="Direct access gateway. Search engines should index reviewed public record pages only.">
  <link rel="canonical" href="https://factualist.org/">
  <link rel="alternate" hreflang="en" href="https://factualist.org/">
  <link rel="alternate" hreflang="x-default" href="https://factualist.org/">
  <link rel="icon" href="/records/assets/favicon.svg" type="image/svg+xml">
  <meta name="theme-color" content="#f3c623">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@graph": [
      {
        "@type": "Organization",
        "@id": "https://factualist.org/#organization",
        "name": "Factualist",
        "url": "https://factualist.org/"
      },
      {
        "@type": "BreadcrumbList",
        "@id": "https://factualist.org/#breadcrumb",
        "itemListElement": [
          {
            "@type": "ListItem",
            "position": 1,
            "name": "Factualist",
            "item": "https://factualist.org/"
          }
        ]
      }
    ]
  }
  </script>
  <style>
    :root{--bg:#0b0b0b;--fg:#f5f1e6;--muted:#c7bfae;--accent:#f3c623;--line:#2a2a2a;--font:"Space Grotesk","Manrope","Trebuchet MS",sans-serif}
    *{box-sizing:border-box}
    body{margin:0;font-family:var(--font);background:radial-gradient(800px 400px at 15% -10%, rgba(243,198,35,.2), transparent 60%),#0b0b0b;color:var(--fg);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
    .gate{max-width:760px;width:100%;text-align:center;border:1px solid var(--line);border-radius:18px;padding:32px;background:#111}
    .eyebrow{text-transform:uppercase;letter-spacing:.28em;font-size:12px;color:var(--accent);margin:0 0 12px}
    h1{font-family:"Bebas Neue","Oswald","Impact","Haettenschweiler",sans-serif;font-size:clamp(34px,6vw,64px);letter-spacing:.04em;margin:0 0 12px}
    p{margin:0 0 16px;color:var(--muted)}
    .actions{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;margin-top:10px}
    .btn{display:inline-flex;align-items:center;justify-content:center;padding:12px 18px;border-radius:999px;border:1px solid var(--line);background:#151515;color:var(--fg);text-decoration:none;font-weight:600}
    .btn.primary{background:var(--accent);color:#0b0b0b;border-color:#c59f1c}
    .fine{font-size:12px;margin-top:18px}
  </style>
</head>
<body>
  <main class="gate">
    <p class="eyebrow">Direct access</p>
    <h1>Factualist Records</h1>
    <p>Search engines should index reviewed public record pages only. Use the record directory to access public records.</p>
    <div class="actions">
      <a class="btn primary" href="/records/">Open record directory</a>
      <a class="btn" href="/records/nichion-valse-2021/ja/">日音・VALSE record</a>
      <a class="btn" href="/records/ac55id-2025/">Go to AC55ID-2025 record</a>
    </div>
    <p class="fine">If you were sent here, follow the record link provided to you.</p>
  </main>
</body>
</html>
