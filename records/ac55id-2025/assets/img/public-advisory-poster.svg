<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0b0b"/>
      <stop offset="1" stop-color="#121212"/>
    </linearGradient>
    <pattern id="tape" width="24" height="24" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="12" height="24" fill="#f3c623"/>
      <rect x="12" width="12" height="24" fill="#121212"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="36" fill="url(#tape)"/>
  <rect x="0" y="594" width="1200" height="36" fill="url(#tape)"/>

  <text x="600" y="120" fill="#f3c623" font-family="Impact, Oswald, sans-serif" font-size="34" letter-spacing="4" text-anchor="middle">PUBLIC ADVISORY</text>
  <text x="600" y="160" fill="#d9d2c1" font-family="Trebuchet MS, sans-serif" font-size="16" letter-spacing="2" text-anchor="middle">FACTUAL DISCLOSURE - VERIFIED SUBMISSIONS ONLY</text>

  <text x="600" y="240" fill="#f5f1e6" font-family="Impact, Oswald, sans-serif" font-size="56" letter-spacing="2" text-anchor="middle">FACTS ONLY.</text>
  <text x="600" y="300" fill="#f5f1e6" font-family="Impact, Oswald, sans-serif" font-size="40" letter-spacing="1" text-anchor="middle">NO ALLEGATIONS. NO PAYOFFS.</text>

  <text x="600" y="360" fill="#c7bfae" font-family="Trebuchet MS, sans-serif" font-size="18" text-anchor="middle">Independent public record of documented events.</text>
  <text x="600" y="390" fill="#c7bfae" font-family="Trebuchet MS, sans-serif" font-size="18" text-anchor="middle">Neutral information for verification and accountability.</text>

  <g fill="#f3c623" font-family="Trebuchet MS, sans-serif" font-size="14" text-anchor="middle">
    <circle cx="250" cy="460" r="28" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="2"/>
    <path d="M242 462v-8a8 8 0 0 1 16 0v8" fill="none" stroke="#f3c623" stroke-width="2"/>
    <rect x="240" y="462" width="20" height="16" rx="2" fill="none" stroke="#f3c623" stroke-width="2"/>
    <text x="250" y="520" fill="#c7bfae">ANONYMITY PROTECTED</text>

    <circle cx="600" cy="460" r="28" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="2"/>
    <rect x="586" y="446" width="28" height="36" rx="3" fill="none" stroke="#f3c623" stroke-width="2"/>
    <line x1="592" y1="458" x2="608" y2="458" stroke="#f3c623" stroke-width="2"/>
    <line x1="592" y1="468" x2="608" y2="468" stroke="#f3c623" stroke-width="2"/>
    <text x="600" y="520" fill="#c7bfae">EVIDENCE REQUIRED</text>

    <circle cx="950" cy="460" r="28" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="2"/>
    <line x1="936" y1="468" x2="964" y2="468" stroke="#f3c623" stroke-width="2"/>
    <line x1="936" y1="456" x2="964" y2="456" stroke="#f3c623" stroke-width="2"/>
    <circle cx="950" cy="456" r="6" fill="none" stroke="#f3c623" stroke-width="2"/>
    <text x="950" y="520" fill="#c7bfae">TIMELINE AND SOURCES</text>
  </g>
</svg>
